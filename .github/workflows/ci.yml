name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache Node.js modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --omit=dev --audit-level=moderate

    - name: Lint code
      run: npm run lint

    - name: Run tests with coverage
      run: npm test -- --coverage

    - name: Build project
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-build
        path: dist

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage

  dev-dependency-audit:
    name: Dev Dependency Audit (Non-blocking)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Run full dependency audit
      id: full-audit
      run: |
        set +e
        npm audit --audit-level=moderate --json > audit-report.json
        exit_code=$?
        echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        if [ "$exit_code" -ne 0 ]; then
          echo "::warning::Dependency vulnerabilities detected (including dev dependencies). See uploaded audit-report artifact."
        fi
        exit 0

    - name: Add audit summary
      if: steps.full-audit.outputs.exit_code != '0'
      run: |
        {
          echo "### Dev dependency audit warning";
          echo "";
          echo "- \`npm audit --audit-level=moderate\` reported vulnerabilities.";
          echo "- This job is non-blocking by design.";
          echo "- Check the \`audit-report\` artifact for details.";
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload audit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: audit-report
        path: audit-report.json
