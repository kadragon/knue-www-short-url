name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Run security audit
      run: bun pm audit --audit-level=moderate
      continue-on-error: true

    - name: Lint code
      run: bun run lint

    - name: Run tests with coverage
      run: bun run test -- --coverage

    - name: Build project
      run: bun run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-build
        path: dist

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage

  dev-dependency-audit:
    name: Dev Dependency Audit (Non-blocking)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Run full dependency audit
      id: full-audit
      run: |
        set +e
        bun pm audit --audit-level=moderate --json > audit-report.json
        exit_code=$?
        echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        if [ "$exit_code" -ne 0 ]; then
          echo "::warning::Dependency vulnerabilities detected (including dev dependencies). See uploaded audit-report artifact."
        fi
        exit 0

    - name: Add audit summary
      if: steps.full-audit.outputs.exit_code != '0'
      run: |
        {
          echo "### Dev dependency audit warning";
          echo "";
          echo "- \`bun pm audit --audit-level=moderate\` reported vulnerabilities.";
          echo "- This job is non-blocking by design.";
          echo "- Check the \`audit-report\` artifact for details.";
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload audit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: audit-report
        path: audit-report.json
